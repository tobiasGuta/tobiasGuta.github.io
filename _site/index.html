<script>

    <script>
      // Copy code button script
      function copyCode(btn) {
        const code = btn.parentElement.querySelector('code');
        if (code) {
          const text = code.innerText;
          navigator.clipboard.writeText(text).then(() => {
            btn.title = "Copied!";
            setTimeout(() => btn.title = "Copy code", 1200);
          });
        }
      }
